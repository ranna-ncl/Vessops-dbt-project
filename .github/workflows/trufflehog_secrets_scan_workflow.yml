name: TruffleHog Secrets Scan

on:
  pull_request:
    branches:
      - main

jobs:
  TruffleHog:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the code from the PR.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Run TruffleHog scan and output JSON.
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: |
            --json

      # Step 3: Upload the JSON report as an artifact if secrets are detected.
      - name: Upload TruffleHog report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report
          path: trufflehog-output.json

      # Step 4: Post a comment on the pull request if secrets are detected.
      - uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('trufflehog-output.json', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Secrets have been detected in this pull request. Please review the findings:\n\n${summary}\n\n[Download full report](https://github.com/${{github.repository}}/actions/runs/${{ github.run_id }})`
            })

      # Step 5: Post a comment on the pull request if no secrets are found.
      - uses: actions/github-script@v7
        if: success()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `No secrets or sensitive information were detected in this pull request. ✅`
            })
